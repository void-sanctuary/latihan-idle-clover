<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Clover Office v2.0 🍀</title>
    <style>
        :root {
            --bg-color: #f9f6f0; /* Warm Cream - Anti Pusing */
            --card-bg: #ffffff;
            --primary: #8cb89f; /* Sage Green Muted */
            --accent: #e8cfa8; /* Soft Latte */
            --text: #5c5c5c;
            --shadow: 0 4px 12px rgba(140, 184, 159, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            overflow-x: hidden;
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* HEADER STATS */
        header {
            text-align: center;
            padding: 25px 20px 10px;
            width: 100%;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .stats-box {
            background: var(--card-bg);
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            margin-top: 15px;
            display: inline-block;
            border: 1px solid rgba(140, 184, 159, 0.3);
        }

        #clover-count { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        #income-rate { font-size: 0.85rem; color: #999; margin-top: 2px; }

        /* MAIN CLICK AREA */
        .click-zone {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .big-clover-btn {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #fff 0%, #f0fdf4 100%);
            border-radius: 50%;
            border: 4px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(140, 184, 159, 0.25);
            transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .big-clover-btn:active { transform: scale(0.92); }

        /* FLOATING TEXT ANIMATION */
        .float-text {
            position: absolute;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.2); }
        }

        /* HORIZONTAL UPGRADE SCROLLER */
        .upgrade-container {
            width: 100%;
            padding: 15px 0 30px;
            background: linear-gradient(to top, var(--bg-color) 80%, transparent);
            z-index: 10;
        }

        .scroll-wrapper {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 20px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .scroll-wrapper::-webkit-scrollbar { display: none; }

        .mini-card {
            min-width: 160px;
            max-width: 160px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            box-shadow: var(--shadow);
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-left: 4px solid var(--primary);
            transition: all 0.2s;
        }

        .mini-card:active { transform: translateY(2px); }

        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .card-icon { font-size: 1.5rem; }
        .card-title { font-weight: bold; font-size: 0.9rem; line-height: 1.2; }
        .card-desc { font-size: 0.7rem; color: #888; margin-bottom: 10px; line-height: 1.3; }
        
        .btn-buy {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-buy:disabled { background: #ddd; color: #aaa; }

        /* BACKGROUND DECORATIONS */
        .bg-deco {
            position: fixed;
            z-index: -1;
            opacity: 0.15;
            font-size: 2.5rem;
            pointer-events: none;
        }
        .sway-1 { animation: sway1 7s infinite ease-in-out alternate; top: 15%; left: 10%; }
        .sway-2 { animation: sway2 9s infinite ease-in-out alternate-reverse; top: 40%; right: 15%; }
        .sway-3 { animation: sway1 8s infinite ease-in-out alternate; bottom: 25%; left: 20%; }
        
        @keyframes sway1 { from { transform: rotate(-15deg) translateX(-10px); } to { transform: rotate(15deg) translateX(10px); } }
        @keyframes sway2 { from { transform: rotate(10deg) translateY(-10px); } to { transform: rotate(-10deg) translateY(10px); } }

    </style>
</head>
<body>

    <!-- Background Elements -->
    <div class="bg-deco sway-1">🍄</div>
    <div class="bg-deco sway-2">☁️</div>
    <div class="bg-deco sway-3">🌿</div>

    <header>
        <h1>Cozy Clover Office 🍀</h1>
        <div class="stats-box">
            <div id="clover-count">0 🍀</div>
            <div id="income-rate">+0 / detik</div>
        </div>
    </header>

    <div class="click-zone">
        <div class="big-clover-btn" id="mainClicker">🍀</div>
    </div>

    <div class="upgrade-container">
        <div class="scroll-wrapper" id="upgrades-list">
            <!-- Upgrades injected by JS -->
        </div>
    </div>

    <script>
        // --- GAME STATE ---
        let gameState = {
            clovers: 0,
            totalIncome: 0,
            clickPower: 1,
            hasRainSound: false,
            upgrades: [
                { id: 'u1', name: 'Kucing Pemalas', icon: '', baseCost: 15, income: 1, count: 0, desc: 'Mendengkur sambil bekerja' },
                { id: 'u2', name: 'Tanaman Hias', icon: '🪴', baseCost: 100, income: 5, count: 0, desc: 'Membersihkan udara kantor' },
                { id: 'u3', name: 'Mesin Kopi', icon: '☕', baseCost: 500, income: 20, count: 0, desc: 'Aroma kopi menenangkan' },
                { id: 'u4', name: 'Hujan Gerimis', icon: '🌧️', baseCost: 2000, income: 75, count: 0, desc: 'Suara alam di dalam ruangan', isRain: true },
                { id: 'u5', name: 'Lampu Gantung', icon: '💡', baseCost: 10000, income: 250, count: 0, desc: 'Cahaya hangat pastel' }
            ]
        };

        // --- AUDIO SYSTEM (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let rainNode = null;

        function playTone(freq, type, duration, vol) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function toggleRainSound(active) {
            if (active && !rainNode) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const bufferSize = 2 * audioCtx.sampleRate;
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

                const whiteNoise = audioCtx.createBufferSource();
                whiteNoise.buffer = noiseBuffer;
                whiteNoise.loop = true;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 800; // Suara hujan lembut

                const gain = audioCtx.createGain();
                gain.gain.value = 0.08; // Volume rendah biar healing

                whiteNoise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                whiteNoise.start();
                rainNode = { source: whiteNoise, gain: gain };
            } else if (!active && rainNode) {
                rainNode.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
                setTimeout(() => {
                    if(rainNode) { rainNode.source.stop(); rainNode = null; }
                }, 600);
            }
        }

        // --- CORE LOGIC ---
        function getCost(u) { return Math.floor(u.baseCost * Math.pow(1.15, u.count)); }

        function updateUI() {
            document.getElementById('clover-count').innerText = Math.floor(gameState.clovers) + ' 🍀';
            document.getElementById('income-rate').innerText = '+' + gameState.totalIncome + ' / detik';
            
            gameState.upgrades.forEach(u => {
                const btn = document.getElementById(`btn-${u.id}`);
                const costEl = document.getElementById(`cost-${u.id}`);
                const countEl = document.getElementById(`count-${u.id}`);
                if(btn) {
                    const c = getCost(u);
                    btn.disabled = gameState.clovers < c;
                    costEl.innerText = c + ' 🍀';
                    countEl.innerText = u.count > 0 ? `(Lv.${u.count})` : '';
                }
            });
        }

        function renderUpgrades() {
            const container = document.getElementById('upgrades-list');
            container.innerHTML = '';
            gameState.upgrades.forEach(u => {
                const card = document.createElement('div');
                card.className = 'mini-card';
                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <span class="card-icon">${u.icon}</span>
                            <span class="card-title">${u.name} <span id="count-${u.id}" style="font-weight:normal; color:#aaa; font-size:0.7em;"></span></span>
                        </div>
                        <div class="card-desc">${u.desc}<br><span style="color:var(--primary)">+${u.income}/detik</span></div>
                    </div>
                    <button id="btn-${u.id}" class="btn-buy" onclick="buyUpgrade('${u.id}')">
                        Beli <span id="cost-${u.id}"></span>
                    </button>
                `;
                container.appendChild(card);
            });
            updateUI();
        }

        // Click Handler
        document.getElementById('mainClicker').addEventListener('pointerdown', (e) => {
            gameState.clovers += gameState.clickPower;
            playTone(600 + Math.random()*200, 'sine', 0.15, 0.05);
            
            const rect = e.target.getBoundingClientRect();
            const float = document.createElement('div');
            float.className = 'float-text';
            float.innerText = '+' + gameState.clickPower;
            // Position relative to viewport for floating effect
            float.style.left = (e.clientX - 10) + 'px';
            float.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 800);
            updateUI();
        });

        function buyUpgrade(id) {
            const u = gameState.upgrades.find(x => x.id === id);
            const cost = getCost(u);
            if (gameState.clovers >= cost) {
                gameState.clovers -= cost;
                u.count++;
                gameState.totalIncome += u.income;
                
                if (u.isRain && u.count === 1) toggleRainSound(true);
                
                playTone(400, 'triangle', 0.2, 0.05);
                updateUI();
            }
        }

        // Game Loop & Save System
        setInterval(() => {
            if (gameState.totalIncome > 0) {
                gameState.clovers += gameState.totalIncome / 10;
                updateUI();
            }
        }, 100);

        function saveGame() { localStorage.setItem('cozyCloverV2', JSON.stringify(gameState)); }
        function loadGame() {
            const s = localStorage.getItem('cozyCloverV2');
            if (s) {
                const p = JSON.parse(s);
                gameState.clovers = p.clovers || 0;
                gameState.totalIncome = 0;
                p.upgrades.forEach((su, i) => {
                    if(gameState.upgrades[i]) {
                        gameState.upgrades[i].count = su.count;
                        gameState.totalIncome += gameState.upgrades[i].income * su.count;
                        if(gameState.upgrades[i].isRain && su.count > 0) toggleRainSound(true);
                    }
                });
            }
        }

        setInterval(saveGame, 10000);
        loadGame();
        renderUpgrades();
    </script>
</body>
</html>
